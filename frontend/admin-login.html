<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuclic - Login Administrador</title>
    <link rel="stylesheet" crossorigin="" href="css/style.css">
    <link rel="stylesheet" crossorigin="" href="css/admin.css">
</head>
<body>
    <div id="root">
        <!-- HEADER Simplificado -->
        <header class="header-nav" style="position: static; padding: 20px 0;">
            <nav class="menu-nav" style="justify-content: center; border: none; background: transparent; box-shadow: none;">
                <a class="logoLink-nav" href="index.html" data-discover="true">
                    <img class="logo-nav" alt="Nuclic" src="assets/logo-nuclic.svg" style="width: 120px;">
                </a>
            </nav>
        </header>

        <main class="page-admin-login">
            <div class="login-container">
                <h2>Acesso Restrito</h2>
                <p>Faça login para gerenciar o sistema</p>
                
                <form id="adminLoginForm">
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" required placeholder="admin@nuclic.ufc.br">
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" name="password" required placeholder="••••••••">
                    </div>

                    <div id="loginError" class="error-message" style="display: none;"></div>
                    
                    <button type="submit" class="primaryButton-home btn-login">Entrar</button>
                </form>
                <div class="login-footer">
                    <a href="index.html">Voltar ao site</a>
                </div>
            </div>
        </main>
    </div>

    <script src="js/admin-login.js"></script>
</body>
</html>
